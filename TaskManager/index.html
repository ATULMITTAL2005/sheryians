<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Task Manager — Vanilla JS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">
  <header class="topbar">
    <h1>Lazy</h1>
    <div class="controls">
      <label class="theme-toggle">
        <input type="checkbox" id="themeSwitch">
        <span class="slider"></span>
      </label>
    </div>
  </header>

  <main class="container">
    <section class="task-creator">
      <form id="taskForm">
        <div class="field">
          <label for="title">Task Title</label>
          <input id="title" name="title" placeholder="Enter task title" maxlength="120" required />
        </div>
        <div class="field">
          <label for="category">Category</label>
          <select id="category" name="category">
            <option value="work">Work</option>
            <option value="personal">Personal</option>
            <option value="study">Study</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="actions">
          <button type="submit" id="addTask">Add Task</button>
        </div>
        <p id="validation" class="validation" aria-live="polite"></p>
      </form>

      <div class="filters">
        <input id="search" placeholder="Search tasks..." />
        <select id="filterCategory">
          <option value="all">All Categories</option>
          <option value="work">Work</option>
          <option value="personal">Personal</option>
          <option value="study">Study</option>
          <option value="other">Other</option>
        </select>
        <select id="filterStatus">
          <option value="all">All Status</option>
          <option value="pending">Pending</option>
          <option value="completed">Completed</option>
        </select>
        <button id="clearCompleted">Clear Completed</button>
      </div>
    </section>

    <section class="stats" id="stats">
      
    </section>

    <section class="tasks" id="tasksContainer" aria-live="polite">
     
    </section>

    <section class="propagation-demo">
      <h2>Event Propagation Demo</h2>
      <div id="grandparent" class="gp">Grandparent
        <div id="parent" class="parent">Parent
          <button id="childBtn" class="child">Child Button (click me)</button>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js" type="module"></script>
</body>
</html>
